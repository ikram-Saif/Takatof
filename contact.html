<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - مبادرة تكاتف</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
                            800: '#075985', 900: '#0c4a6e',
                        },
                        accent: {
                            50: '#f0fdf4', 500: '#22c55e', 600: '#16a34a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-slate-800 font-sans leading-[1.8] overflow-x-hidden text-[17px]">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-200 transition-transform hover:scale-105">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <span class="text-xl font-extrabold text-slate-800 tracking-tight">مبادرة <span class="text-brand-600">تكاتف</span></span>
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="index.html" class="nav-link">الرئيسية</a>
                    <a href="materials.html" class="nav-link">المواد المتاحة</a>
                    <a href="contact.html" class="nav-link active">تواصل معنا</a>
                    <a href="materials.html?openModal=add" class="inline-flex items-center justify-center px-6 py-3 text-sm font-bold text-white bg-brand-600 rounded-xl hover:bg-brand-700 transition-all shadow-md hover:shadow-lg active:scale-95">
                        تبرع الآن
                    </a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden">
                    <button type="button" class="text-slate-600 p-2 rounded-lg hover:bg-slate-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h1 class="text-4xl sm:text-5xl font-black text-slate-900 mb-4">تواصل معنا</h1>
                <p class="text-slate-600 font-medium">لديك أي استفسارات أو ترغب في دعم المبادرة؟ أرسل لنا رسالة!</p>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 sm:p-12 border border-slate-100 shadow-2xl shadow-slate-200/50">
                <form class="space-y-6"
                    onsubmit="event.preventDefault(); alert('تم إرسال الرسالة بنجاح! سنقوم بالرد عليك قريباً.'); this.reset();">
                    <div>
                        <label for="contactName" class="block text-sm font-bold text-slate-700 mb-3 ms-2">الاسم
                            الكامل</label>
                        <input type="text" id="contactName" name="name" required placeholder="أحمد علي"
                            class="w-full premium-input h-14">
                    </div>
                    <div>
                        <label for="contactSubject"
                            class="block text-sm font-bold text-slate-700 mb-3 ms-2">الموضوع</label>
                        <input type="text" id="contactSubject" name="subject" required
                            placeholder="استفسار حول المبادرة" class="w-full premium-input h-14">
                    </div>
                    <div>
                        <label for="contactMessage"
                            class="block text-sm font-bold text-slate-700 mb-3 ms-2">الرسالة</label>
                        <textarea id="contactMessage" name="message" rows="6" required placeholder="كيف يمكننا مساعدتك؟"
                            class="w-full premium-textarea text-lg"></textarea>
                    </div>
                    <div class="pt-6">
                        <button type="submit"
                            class="w-full py-5 btn-primary-premium text-xl rounded-2xl shadow-elevated">
                            إرسال الرسالة الآن
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 pt-20 pb-10 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <span class="text-3xl font-extrabold tracking-tight mb-6 inline-block">مبادرة <span
                    class="text-brand-500">تكاتف</span></span>
            <div class="w-20 h-1 bg-brand-600 mx-auto mb-8 rounded-full"></div>
            <div class="flex flex-wrap justify-center gap-x-8 gap-y-4 mb-8 text-sm font-medium text-slate-400">
                <a href="index.html" class="hover:text-white transition-colors">الرئيسية</a>
                <a href="materials.html" class="hover:text-white transition-colors">المواد المتاحة</a>
                <a href="privacy-policy.html" class="hover:text-white transition-colors">سياسة الخصوصية</a>
            </div>
            <p class="text-slate-500 text-sm mb-4">بناء مجتمع أكاديمي متضامن</p>
            <p class="text-slate-600 text-xs tracking-wide">&copy; 2026 مبادرة تكاتف. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

</body>

</html>
